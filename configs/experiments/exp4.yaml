experiment_key: exp4
category: evaluation
description: End-to-end evaluation preset for retrieval, selective rewrite, and answer quality.
generation_strategy: C
enable_code_mixed: false
enable_rule_filter: true
enable_llm_self_eval: true
enable_retrieval_utility: true
enable_diversity: true
enable_anti_copy: true
gating_preset: full_gating
memory_top_n: 5
rewrite_candidate_count: 3
rewrite_threshold: 0.05
retrieval_top_k: 20
rerank_top_n: 5
use_session_context: true
avg_queries_per_chunk: 4.2
query_type_distribution:
  definition: 0.19
  reason: 0.17
  procedure: 0.21
  comparison: 0.12
  short_user: 0.12
  code_mixed: 0.09
  follow_up: 0.09
answerability_distribution:
  single: 0.70
  near: 0.20
  far: 0.10
final_score_threshold: 0.75
utility_threshold: 0.70
random_seed: 21
