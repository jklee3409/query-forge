experiment_key: full_gating
category: gating
description: Full gating preset with rule + llm self-eval + utility + diversity + final score.
generation_strategy: C
enable_code_mixed: true
enable_rule_filter: true
enable_llm_self_eval: true
enable_retrieval_utility: true
enable_diversity: true
enable_anti_copy: true
gating_preset: full_gating
memory_top_n: 5
rewrite_candidate_count: 3
rewrite_threshold: 0.05
retrieval_top_k: 20
rerank_top_n: 5
use_session_context: true
avg_queries_per_chunk: 4.2
query_type_distribution:
  definition: 0.19
  reason: 0.17
  procedure: 0.21
  comparison: 0.12
  short_user: 0.12
  code_mixed: 0.09
  follow_up: 0.09
answerability_distribution:
  single: 0.70
  near: 0.20
  far: 0.10
retrieval_utility_weights:
  target_top1: 1.00
  target_top3: 0.85
  target_top5: 0.70
  same_doc_top3: 0.55
  same_doc_top5: 0.40
  outside_top5: 0.00
  multi_partial_bonus: 0.05
  multi_full_bonus: 0.12
gating_weights:
  utility: 0.50
  llm: 0.35
  novelty: 0.15
final_score_threshold: 0.75
utility_threshold: 0.70
diversity_threshold_same_chunk: 0.93
diversity_threshold_same_doc: 0.96
random_seed: 13
