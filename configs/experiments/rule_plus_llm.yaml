experiment_key: rule_plus_llm
category: gating
description: Rule + LLM self-eval gating baseline.
generation_strategy: C
enable_code_mixed: true
enable_rule_filter: true
enable_llm_self_eval: true
enable_retrieval_utility: false
enable_diversity: false
enable_anti_copy: true
gating_preset: rule_plus_llm
memory_top_n: 5
rewrite_candidate_count: 3
rewrite_threshold: 0.05
retrieval_top_k: 20
rerank_top_n: 5
use_session_context: false
avg_queries_per_chunk: 4.2
final_score_threshold: 0.75
utility_threshold: 0.70
random_seed: 15

