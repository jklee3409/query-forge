spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:query_forge}
    username: ${POSTGRES_USER:query_forge}
    password: ${POSTGRES_PASSWORD:query_forge}
  flyway:
    default-schema: public

query-forge:
  data-root: ./data
  prompt-root: ./configs/prompts
  experiment-root: ./configs/experiments
  llm:
    provider: ${QUERY_FORGE_LLM_PROVIDER:gemini}
    model: ${QUERY_FORGE_LLM_MODEL:gemini-2.5-flash}
    summary_model: ${QUERY_FORGE_LLM_SUMMARY_MODEL:gemini-2.5-flash}
    query_model: ${QUERY_FORGE_LLM_QUERY_MODEL:gemini-2.5-flash}
    self_eval_model: ${QUERY_FORGE_LLM_SELF_EVAL_MODEL:gemini-2.5-flash}
    rewrite_model: ${QUERY_FORGE_LLM_REWRITE_MODEL:gemini-2.5-flash}
    rpm: ${QUERY_FORGE_LLM_RPM:1000}
    tpm: ${QUERY_FORGE_LLM_TPM:1000000}
    rpd: ${QUERY_FORGE_LLM_RPD:10000}
