spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:query_forge}
    username: ${POSTGRES_USER:query_forge}
    password: ${POSTGRES_PASSWORD:query_forge}
  flyway:
    default-schema: public

query-forge:
  data-root: ./data
  prompt-root: ./configs/prompts
  experiment-root: ./configs/experiments
  llm:
    provider: ${QUERY_FORGE_LLM_PROVIDER:gemini-native}
    model: ${QUERY_FORGE_LLM_MODEL:gemini-2.5-flash-lite}
    summary_model: ${QUERY_FORGE_LLM_SUMMARY_MODEL:gemini-2.5-flash-lite}
    query_model: ${QUERY_FORGE_LLM_QUERY_MODEL:gemini-2.5-flash-lite}
    self_eval_model: ${QUERY_FORGE_LLM_SELF_EVAL_MODEL:gemini-2.5-flash-lite}
    rewrite_model: ${QUERY_FORGE_LLM_REWRITE_MODEL:gemini-2.5-flash-lite}
    fallback_models: ${QUERY_FORGE_LLM_FALLBACK_MODELS:gemini-2.5-flash}
    max_retries: ${QUERY_FORGE_LLM_MAX_RETRIES:4}
    backoff_initial_seconds: ${QUERY_FORGE_LLM_BACKOFF_INITIAL_SECONDS:0.75}
    backoff_max_seconds: ${QUERY_FORGE_LLM_BACKOFF_MAX_SECONDS:12}
    backoff_multiplier: ${QUERY_FORGE_LLM_BACKOFF_MULTIPLIER:2.0}
    backoff_jitter_ratio: ${QUERY_FORGE_LLM_BACKOFF_JITTER_RATIO:0.35}
    thinking_budget: ${QUERY_FORGE_LLM_THINKING_BUDGET:0}
    max_output_tokens: ${QUERY_FORGE_LLM_MAX_OUTPUT_TOKENS:384}
    concurrency_limit: ${QUERY_FORGE_LLM_CONCURRENCY_LIMIT:4}
    rpm: ${QUERY_FORGE_LLM_RPM:300}
    tpm: ${QUERY_FORGE_LLM_TPM:1000000}
    rpd: ${QUERY_FORGE_LLM_RPD:10000}
