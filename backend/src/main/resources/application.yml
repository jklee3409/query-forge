spring:
  application:
    name: query-forge-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:query_forge}
    username: ${POSTGRES_USER:query_forge}
    password: ${POSTGRES_PASSWORD:query_forge}
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    check-template-location: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    io.queryforge.backend.common.logging.ApplicationLayerLoggingAspect: DEBUG

query-forge:
  config-dir: ${QUERY_FORGE_CONFIG_DIR:../configs/app}
  prompt-root: ${PROMPT_ROOT:../configs/prompts}
  experiment-root: ${EXPERIMENT_ROOT:../configs/experiments}
  admin:
    pipeline:
      repo-root: ${QUERY_FORGE_REPO_ROOT:.}
      python-command: ${QUERY_FORGE_PYTHON:python}
      logs-dir: ${QUERY_FORGE_LOG_DIR:data/logs/admin-pipeline}
      artifact-store-dir: ${QUERY_FORGE_ARTIFACT_STORE_DIR:data/artifacts/corpus-docs}
      source-config-dir: ${QUERY_FORGE_SOURCE_CONFIG_DIR:configs/app/sources}
      chunking-config: ${QUERY_FORGE_CHUNKING_CONFIG:configs/app/chunking.yml}
      raw-output-path: ${QUERY_FORGE_RAW_OUTPUT:data/raw/spring_docs_raw.jsonl}
      sections-output-path: ${QUERY_FORGE_SECTIONS_OUTPUT:data/processed/spring_docs_sections.jsonl}
      chunks-output-path: ${QUERY_FORGE_CHUNKS_OUTPUT:data/processed/chunks.jsonl}
      glossary-output-path: ${QUERY_FORGE_GLOSSARY_OUTPUT:data/processed/glossary_terms.jsonl}
      relations-output-path: ${QUERY_FORGE_RELATIONS_OUTPUT:data/processed/chunk_neighbors.sql}
      visualization-output-path: ${QUERY_FORGE_VISUALIZATION_OUTPUT:data/processed/chunking_visualization.md}
      max-log-chars: ${QUERY_FORGE_MAX_LOG_CHARS:12000}
