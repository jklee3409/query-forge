spring:
  application:
    name: query-forge-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:query_forge}
    username: ${POSTGRES_USER:query_forge}
    password: ${POSTGRES_PASSWORD:query_forge}
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    check-template-location: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

query-forge:
  config-dir: ${QUERY_FORGE_CONFIG_DIR:../configs/app}
  prompt-root: ${PROMPT_ROOT:../configs/prompts}
  experiment-root: ${EXPERIMENT_ROOT:../configs/experiments}
