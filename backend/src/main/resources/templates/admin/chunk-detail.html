<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${chunk.chunkId()}">Chunk Detail</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${chunk.chunkId()}, ${chunk.sectionPathText()})}"></div>

            <section class="detail-card">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-item__label">Document</div>
                        <div class="detail-item__value"><a th:href="@{/admin/documents/{id}(id=${chunk.documentId()})}" th:text="${chunk.documentId()}">doc</a></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">Section Path</div>
                        <div class="detail-item__value" th:text="${chunk.sectionPathText()}">section</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">Run</div>
                        <div class="detail-item__value"><a class="mono-truncate" th:href="@{/admin/runs/{id}(id=${chunk.importRunId()})}" th:text="${chunk.importRunId()}">run</a></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">Length</div>
                        <div class="detail-item__value" th:text="|tokens ${chunk.tokenLen()} / chars ${chunk.charLen()}|">length</div>
                    </div>
                </div>
                <div class="badge-row" style="margin-top:14px;">
                    <span class="plain-badge plain-badge--code" th:if="${chunk.codePresence()}">code_presence</span>
                    <span class="plain-badge plain-badge--table" th:if="${chunk.tablePresence()}">table_presence</span>
                    <span class="plain-badge plain-badge--list" th:if="${chunk.listPresence()}">list_presence</span>
                </div>
            </section>

            <div class="split-layout" style="margin-top:20px;">
                <section class="panel">
                    <div class="table-title">Text Preview</div>
                    <div class="text-surface" style="margin-top:12px;" th:text="${chunk.chunkText()}">text</div>
                </section>

                <section class="panel">
                    <div class="table-title">Prev / Current / Next</div>
                    <div class="timeline" style="margin-top:12px;">
                        <div class="timeline-card" th:if="${previousChunk != null}">
                            <div class="detail-item__label">Previous</div>
                            <div class="mono-truncate" th:text="${previousChunk.chunkId()}">prev</div>
                            <div class="line-clamp-2" th:text="${previousChunk.chunkText()}">prev text</div>
                        </div>
                        <div class="timeline-card">
                            <div class="detail-item__label">Current</div>
                            <div class="mono-truncate" th:text="${chunk.chunkId()}">current</div>
                            <div class="line-clamp-2" th:text="${chunk.chunkText()}">current text</div>
                        </div>
                        <div class="timeline-card" th:if="${nextChunk != null}">
                            <div class="detail-item__label">Next</div>
                            <div class="mono-truncate" th:text="${nextChunk.chunkId()}">next</div>
                            <div class="line-clamp-2" th:text="${nextChunk.chunkText()}">next text</div>
                        </div>
                    </div>
                </section>
            </div>

            <section class="panel" style="margin-top:20px;">
                <div class="table-title">Relation List</div>
                <div class="relation-list" style="margin-top:14px;" th:if="${!neighbors.isEmpty()}">
                    <div class="relation-item" th:each="neighbor : ${neighbors}">
                        <div class="toolbar">
                            <a class="mono-truncate" th:href="@{/admin/chunks/{id}(id=${neighbor.targetChunkId()})}" th:text="${neighbor.targetChunkId()}">neighbor</a>
                            <span class="plain-badge" th:text="${neighbor.relationType()}">near</span>
                            <span class="plain-badge" th:text="|distance ${neighbor.distanceInDoc()}|">1</span>
                        </div>
                        <div class="summary-card__meta" th:text="${neighbor.targetSectionPathText()}">path</div>
                    </div>
                </div>
                <div class="empty-state" th:if="${neighbors.isEmpty()}">
                    relation이 없습니다.
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
