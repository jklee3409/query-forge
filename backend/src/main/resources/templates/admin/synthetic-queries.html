<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">합성 질의 생성/조회</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
    <script defer th:src="@{/admin/console.js}"></script>
</head>
<body data-admin-page="synthetic">
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"></div>

            <section class="table-shell">
                <div class="table-header">
                    <div class="table-title">생성 방식 관리</div>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="synthetic-methods-table">
                        <thead>
                        <tr>
                            <th>코드</th>
                            <th>방식명</th>
                            <th>설명</th>
                            <th>Prompt 버전</th>
                            <th>활성</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="panel" style="margin-top: 16px;">
                <div class="table-title">합성 질의 생성 실행</div>
                <form class="filter-bar" id="synthetic-run-form">
                    <div class="filter-field">
                        <label for="synthetic-method-code">생성 방식</label>
                        <select id="synthetic-method-code" name="methodCode"></select>
                    </div>
                    <div class="filter-field">
                        <label for="synthetic-version-name">배치 버전명</label>
                        <input id="synthetic-version-name" name="versionName" placeholder="예: c-main-v1">
                    </div>
                    <div class="filter-field">
                        <label for="synthetic-source-version">소스 문서 버전</label>
                        <input id="synthetic-source-version" name="sourceDocumentVersion" placeholder="예: 6.1">
                    </div>
                    <div class="filter-field filter-field--small">
                        <label for="synthetic-limit-chunks">청크 제한</label>
                        <input id="synthetic-limit-chunks" type="number" name="limitChunks" min="1">
                    </div>
                    <div class="filter-field--small">
                        <button type="submit" class="button button--primary">생성 실행</button>
                    </div>
                </form>
            </section>

            <section class="summary-grid" id="synthetic-stats-cards" style="margin-top: 16px;"></section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">생성 배치 이력</div>
                    <button class="button" data-refresh-page>새로고침</button>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="synthetic-batches-table">
                        <thead>
                        <tr>
                            <th>배치 ID</th>
                            <th>생성 방식</th>
                            <th>버전명</th>
                            <th>상태</th>
                            <th>시작</th>
                            <th>종료</th>
                            <th>생성 수</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">LLM 비동기 잡 상태</div>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="synthetic-llm-jobs-table">
                        <thead>
                        <tr>
                            <th>job_id</th>
                            <th>유형</th>
                            <th>상태</th>
                            <th>진행률</th>
                            <th>재시도</th>
                            <th>생성 배치</th>
                            <th>제어</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="panel" style="margin-top: 16px;" id="synthetic-llm-job-items-panel"></section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">합성 질의 조회</div>
                </div>
                <form class="filter-bar" id="synthetic-query-filter-form">
                    <div class="filter-field">
                        <label for="synthetic-filter-method">생성 방식</label>
                        <select id="synthetic-filter-method" name="method_code"></select>
                    </div>
                    <div class="filter-field">
                        <label for="synthetic-filter-batch">생성 배치</label>
                        <select id="synthetic-filter-batch" name="batch_id"></select>
                    </div>
                    <div class="filter-field">
                        <label for="synthetic-filter-type">질의 유형</label>
                        <input id="synthetic-filter-type" name="query_type" placeholder="예: definition">
                    </div>
                    <div class="filter-field">
                        <label for="synthetic-filter-gated">게이팅 통과 여부</label>
                        <select id="synthetic-filter-gated" name="gated">
                            <option value="">전체</option>
                            <option value="true">통과</option>
                            <option value="false">미통과</option>
                        </select>
                    </div>
                    <div class="filter-field--small">
                        <button type="submit" class="button button--primary">조회</button>
                    </div>
                </form>
                <div class="table-wrap">
                    <table class="data-table" id="synthetic-queries-table">
                        <thead>
                        <tr>
                            <th>질의 ID</th>
                            <th>질의 문장</th>
                            <th>유형</th>
                            <th>방식</th>
                            <th>배치</th>
                            <th>게이팅</th>
                            <th>상세</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="panel" style="margin-top: 16px;" id="synthetic-query-detail-panel"></section>
        </main>
    </div>
</div>
</body>
</html>
