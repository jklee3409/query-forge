<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(navKey)" class="admin-sidebar">
    <div class="admin-sidebar__brand">
        <div class="admin-sidebar__logo">QF</div>
        <div>
            <div class="admin-sidebar__title">Query Forge</div>
            <div class="admin-sidebar__subtitle">연구 관리자 콘솔</div>
        </div>
    </div>

    <nav class="admin-nav">
        <a th:href="@{/admin/pipeline}" class="admin-nav__link" th:classappend="${navKey == 'pipeline'} ? ' is-active'">
            <span>문서 파이프라인 관리</span>
        </a>
        <a th:href="@{/admin/synthetic-queries}" class="admin-nav__link" th:classappend="${navKey == 'synthetic'} ? ' is-active'">
            <span>합성 질의 생성/조회</span>
        </a>
        <a th:href="@{/admin/quality-gating}" class="admin-nav__link" th:classappend="${navKey == 'gating'} ? ' is-active'">
            <span>Quality Gating 관리</span>
        </a>
        <a th:href="@{/admin/rag-tests}" class="admin-nav__link" th:classappend="${navKey == 'rag-tests'} ? ' is-active'">
            <span>RAG 성능/품질 테스트</span>
        </a>
    </nav>

    <div class="admin-sidebar__section">
        <div class="admin-sidebar__section-title">빠른 이동</div>
        <a th:href="@{/}" class="admin-nav__link">채팅 화면</a>
    </div>
</aside>

<header th:fragment="topbar(title, subtitle)" class="admin-topbar">
    <button type="button" class="admin-topbar__menu" data-sidebar-toggle>메뉴</button>
    <div class="admin-topbar__meta">
        <div class="admin-topbar__title" th:text="${title}">연구 관리자 콘솔</div>
        <div class="admin-topbar__subtitle" th:text="${subtitle}">subtitle</div>
    </div>
    <div class="admin-topbar__actions">
        <a th:href="@{/admin/pipeline}" class="button button--primary">기본 페이지</a>
    </div>
</header>

<div th:fragment="pageHeader(title, subtitle)" class="page-header">
    <div>
        <h1 class="page-header__title" th:text="${title}">페이지 제목</h1>
        <p class="page-header__subtitle" th:text="${subtitle}">페이지 설명</p>
    </div>
</div>
</body>
</html>
