<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${termDetail.term().canonicalForm()}">Glossary Detail</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${termDetail.term().canonicalForm()}, ${termDetail.term().termType()})}"></div>

            <div class="split-layout">
                <section class="panel">
                    <div class="table-title">Term Policy</div>
                    <div class="detail-grid" style="margin-top:14px;">
                        <div class="detail-item">
                            <div class="detail-item__label">Canonical Form</div>
                            <div class="detail-item__value mono" th:text="${termDetail.term().canonicalForm()}">term</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-item__label">Term Type</div>
                            <div class="detail-item__value" th:text="${termDetail.term().termType()}">annotation</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-item__label">First Seen</div>
                            <div class="detail-item__value">
                                <a th:href="@{/admin/documents/{id}(id=${termDetail.term().firstSeenDocumentId()})}" th:text="${termDetail.term().firstSeenDocumentId()}">doc</a>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-item__label">Evidence Count</div>
                            <div class="detail-item__value" th:text="${termDetail.term().evidenceCount()}">0</div>
                        </div>
                    </div>

                    <form class="form-shell" style="margin-top:18px;" data-api-form data-method="PATCH" data-reload="true" data-success-message="용어 정책을 저장했습니다."
                          th:action="@{/api/admin/corpus/glossary/{id}(id=${termDetail.term().termId()})}">
                        <div class="form-row">
                            <label for="descriptionShort">설명 Description</label>
                            <textarea id="descriptionShort" name="descriptionShort" rows="3" th:text="${termDetail.term().descriptionShort()}"></textarea>
                        </div>
                        <div class="form-row">
                            <label><input type="checkbox" name="keepInEnglish" th:checked="${termDetail.term().keepInEnglish()}"> keep_in_english 유지</label>
                        </div>
                        <div class="form-row">
                            <label><input type="checkbox" name="active" th:checked="${termDetail.term().active()}"> 활성 상태 유지</label>
                        </div>
                        <div class="form-actions">
                            <button class="button button--primary" type="submit">정책 저장</button>
                        </div>
                    </form>
                </section>

                <section class="panel">
                    <div class="table-title">Aliases</div>
                    <div class="detail-list" style="margin-top:14px;" th:if="${!termDetail.aliases().isEmpty()}">
                        <div class="timeline-card" th:each="alias : ${termDetail.aliases()}">
                            <div class="toolbar">
                                <div class="mono" th:text="${alias.aliasText()}">alias</div>
                                <span class="plain-badge" th:text="${alias.aliasType()}">same_case</span>
                                <button type="button" class="button button--ghost" data-api-delete data-reload="true"
                                        data-confirm="이 alias를 삭제할까요?"
                                        th:attr="data-api-delete=@{/api/admin/corpus/glossary/aliases/{id}(id=${alias.aliasId()})}">Delete</button>
                            </div>
                        </div>
                    </div>

                    <form class="form-shell" style="margin-top:16px;" data-api-form data-method="POST" data-reload="true" data-success-message="Alias를 추가했습니다."
                          th:action="@{/api/admin/corpus/glossary/{id}/aliases(id=${termDetail.term().termId()})}">
                        <div class="form-row">
                            <label for="aliasText">Alias Text</label>
                            <input id="aliasText" name="aliasText" placeholder="application.yml">
                        </div>
                        <div class="form-row">
                            <label for="aliasLanguage">언어 Language</label>
                            <input id="aliasLanguage" name="aliasLanguage" value="en">
                        </div>
                        <div class="form-row">
                            <label for="aliasType">Alias Type</label>
                            <select id="aliasType" name="aliasType">
                                <option value="same_case">same_case</option>
                                <option value="kebab">kebab</option>
                                <option value="dotted">dotted</option>
                                <option value="spaced">spaced</option>
                                <option value="translated">translated</option>
                                <option value="abbreviation">abbreviation</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button class="button" type="submit">Alias 추가</button>
                        </div>
                    </form>
                </section>
            </div>

            <section class="panel" style="margin-top:20px;">
                <div class="table-title">Evidence Snippets</div>
                <div class="detail-list" style="margin-top:14px;" th:if="${!evidence.isEmpty()}">
                    <div class="snippet-card" th:each="item : ${evidence}">
                        <div class="toolbar">
                            <a th:href="@{/admin/documents/{id}(id=${item.documentId()})}" th:text="${item.documentId()}">doc</a>
                            <a th:href="@{/admin/chunks/{id}(id=${item.chunkId()})}" class="mono" th:text="${item.chunkId()}">chunk</a>
                        </div>
                        <div class="evidence-snippet" style="margin-top:10px;" th:text="${item.matchedText()}">@Value</div>
                        <div class="summary-card__meta mono" style="margin-top:8px;" th:text="${item.lineOrOffsetInfo()}">offset</div>
                    </div>
                </div>
                <div class="empty-state" th:if="${evidence.isEmpty()}">
                    evidence가 없습니다.
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
