<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">실험 모니터링</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"></div>

            <section class="table-shell">
                <div class="table-header">
                    <div class="table-title">최근 Experiment Runs</div>
                </div>
                <div class="table-wrap">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Run ID</th>
                            <th>Experiment</th>
                            <th>Status</th>
                            <th>Started</th>
                            <th>Finished</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="run : ${recentExperimentRuns}">
                            <td class="mono-truncate" th:text="${run.experimentRunId()}">run</td>
                            <td th:text="${run.experimentKey()}">exp4</td>
                            <td><span class="status-badge" th:attr="data-status=${run.status()}" th:text="${run.status()}">completed</span></td>
                            <td th:text="${run.startedAt() != null ? #temporals.format(run.startedAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                            <td th:text="${run.finishedAt() != null ? #temporals.format(run.finishedAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <div class="card-grid" style="margin-top:16px;">
                <section class="panel">
                    <div class="table-title">실험 실행 컨트롤</div>
                    <div class="toolbar" style="margin-top:12px;">
                        <label class="filter-field">
                            <span>Experiment</span>
                            <input id="expName" class="control" value="exp4">
                        </label>
                        <button class="button button--primary" data-exp-command="generate-queries">5. Generate</button>
                        <button class="button button--primary" data-exp-command="gate-queries">6. Gate</button>
                        <button class="button button--primary" data-exp-command="build-memory">7. Build Memory</button>
                        <button class="button button--primary" data-exp-command="build-eval-dataset">11. Build Eval</button>
                        <button class="button button--primary" data-exp-command="eval-retrieval">12. Eval Retrieval</button>
                        <button class="button button--primary" data-exp-command="eval-answer">12. Eval Answer</button>
                    </div>
                    <pre id="commandOutput" class="log-viewer" style="margin-top:12px;">(command output)</pre>
                </section>
            </div>

            <div class="card-grid" style="margin-top:16px;">
                <section class="panel">
                    <div class="table-title">Retrieval Eval Summary</div>
                    <pre id="retrievalReport" class="log-viewer">loading...</pre>
                </section>
                <section class="panel">
                    <div class="table-title">Answer Eval Summary</div>
                    <pre id="answerReport" class="log-viewer">loading...</pre>
                </section>
            </div>
        </main>
    </div>
</div>
<script>
  (async () => {
    const retrievalNode = document.getElementById("retrievalReport");
    const answerNode = document.getElementById("answerReport");
    try {
      const retrievalRes = await fetch("/api/eval/retrieval");
      const retrievalPayload = await retrievalRes.json();
      retrievalNode.textContent = JSON.stringify(retrievalPayload.payload || retrievalPayload, null, 2);
    } catch (error) {
      retrievalNode.textContent = `failed: ${error.message}`;
    }
    try {
      const answerRes = await fetch("/api/eval/answer");
      const answerPayload = await answerRes.json();
      answerNode.textContent = JSON.stringify(answerPayload.payload || answerPayload, null, 2);
    } catch (error) {
      answerNode.textContent = `failed: ${error.message}`;
    }
  })();

  document.querySelectorAll("[data-exp-command]").forEach((button) => {
    button.addEventListener("click", async () => {
      const experiment = document.getElementById("expName").value || "exp4";
      const command = button.dataset.expCommand;
      const outputNode = document.getElementById("commandOutput");
      outputNode.textContent = `running ${command} (${experiment})...`;
      button.disabled = true;
      try {
        const response = await fetch("/api/admin/experiments/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command, experiment }),
        });
        const payload = await response.json();
        if (!response.ok || payload.exitCode !== 0) {
          outputNode.textContent = JSON.stringify(payload, null, 2);
          return;
        }
        outputNode.textContent = JSON.stringify(payload.summary || payload, null, 2);
      } catch (error) {
        outputNode.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    });
  });
</script>
</body>
</html>
