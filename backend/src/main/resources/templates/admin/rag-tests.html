<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">RAG 성능/품질 테스트</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
    <script defer th:src="@{/admin/console.js}"></script>
</head>
<body data-admin-page="rag-tests">
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"></div>

            <section class="panel">
                <div class="table-title">테스트 실행</div>
                <form class="filter-bar" id="rag-test-run-form">
                    <div class="filter-field">
                        <label for="rag-dataset-id">평가 데이터셋</label>
                        <select id="rag-dataset-id" name="datasetId"></select>
                    </div>
                    <div class="filter-field">
                        <label for="rag-gating-preset">게이팅 프리셋</label>
                        <select id="rag-gating-preset" name="gatingPreset">
                            <option value="ungated">ungated</option>
                            <option value="rule_only">rule_only</option>
                            <option value="rule_plus_llm">rule_plus_llm</option>
                            <option value="full_gating" selected>full_gating</option>
                        </select>
                    </div>
                    <div class="filter-field">
                        <label for="rag-threshold">Rewrite Threshold</label>
                        <input id="rag-threshold" type="number" step="0.01" min="0" max="1" name="threshold" value="0.05">
                    </div>
                    <div class="filter-field">
                        <label for="rag-retrieval-top-k">Retrieval Top-K</label>
                        <input id="rag-retrieval-top-k" type="number" min="1" name="retrievalTopK" value="20">
                    </div>
                    <div class="filter-field">
                        <label for="rag-rerank-top-n">Rerank Top-N</label>
                        <input id="rag-rerank-top-n" type="number" min="1" name="rerankTopN" value="5">
                    </div>
                    <div class="filter-field filter-field--small">
                        <label><input type="checkbox" name="gatingApplied" checked> 게이팅 반영</label>
                        <label><input type="checkbox" name="rewriteEnabled" checked> Rewrite 사용</label>
                        <label><input type="checkbox" name="selectiveRewrite" checked> Selective</label>
                        <label><input type="checkbox" name="useSessionContext"> Session Context</label>
                    </div>
                    <div class="filter-field">
                        <label>생성 방식 선택</label>
                        <div id="rag-method-checks" class="badge-row"></div>
                    </div>
                    <div class="filter-field--small">
                        <button type="submit" class="button button--primary">테스트 실행</button>
                    </div>
                </form>
            </section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">평가 데이터셋</div>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="rag-datasets-table">
                        <thead>
                        <tr>
                            <th>데이터셋 ID</th>
                            <th>이름</th>
                            <th>버전</th>
                            <th>문항 수</th>
                            <th>생성 일시</th>
                            <th>문항 보기</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="panel" style="margin-top: 16px;" id="rag-dataset-items-panel"></section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">RAG 테스트 실행 이력</div>
                    <button class="button" data-refresh-page>새로고침</button>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="rag-tests-table">
                        <thead>
                        <tr>
                            <th>테스트 ID</th>
                            <th>상태</th>
                            <th>데이터셋</th>
                            <th>생성 방식</th>
                            <th>게이팅</th>
                            <th>Rewrite</th>
                            <th>지표 요약</th>
                            <th>상세</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section class="summary-grid" id="rag-summary-cards" style="margin-top: 16px;"></section>

            <section class="table-shell" style="margin-top: 16px;">
                <div class="table-header">
                    <div class="table-title">상세 결과(질의 단위)</div>
                </div>
                <div class="table-wrap">
                    <table class="data-table" id="rag-details-table">
                        <thead>
                        <tr>
                            <th>sample_id</th>
                            <th>카테고리</th>
                            <th>원본 질의</th>
                            <th>재작성 질의</th>
                            <th>재작성 적용</th>
                            <th>hit</th>
                            <th>기여 지표</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
