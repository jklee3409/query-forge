<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">청크 Chunks</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"></div>

            <form class="filter-bar" data-persist-key="chunks-filters" method="get" th:action="@{/admin/chunks}">
                <div class="filter-field filter-field--small">
                    <label for="document_id">Document ID</label>
                    <input id="document_id" name="document_id" placeholder="doc_xxx" th:value="${param.document_id}">
                </div>
                <div class="filter-field filter-field--small">
                    <label for="product_name">제품 Product</label>
                    <input id="product_name" name="product_name" placeholder="spring-framework" th:value="${param.product_name}">
                </div>
                <div class="filter-field filter-field--small">
                    <label for="code_presence">Code Presence</label>
                    <select id="code_presence" name="code_presence">
                        <option value="">전체</option>
                        <option value="true" th:selected="${param.code_presence == 'true'}">code only</option>
                        <option value="false" th:selected="${param.code_presence == 'false'}">no code</option>
                    </select>
                </div>
                <div class="filter-field filter-field--small">
                    <label for="min_token_len">Min Token</label>
                    <input id="min_token_len" name="min_token_len" type="number" th:value="${param.min_token_len}">
                </div>
                <div class="filter-field filter-field--small">
                    <label for="max_token_len">Max Token</label>
                    <input id="max_token_len" name="max_token_len" type="number" th:value="${param.max_token_len}">
                </div>
                <div class="filter-field">
                    <label for="chunk_keyword">본문 검색 Keyword</label>
                    <input id="chunk_keyword" name="chunk_keyword" placeholder="HikariCP, @Value, BeanFactory" th:value="${param.chunk_keyword}">
                </div>
                <div class="form-actions">
                    <button class="button button--primary" type="submit">필터 적용</button>
                    <a class="button button--ghost" th:href="@{/admin/chunks}">Reset</a>
                </div>
            </form>

            <section class="table-shell">
                <div class="table-header">
                    <div class="table-title">Chunk 목록</div>
                </div>
                <div class="table-wrap" th:if="${!chunks.isEmpty()}">
                    <table class="data-table" data-sort-table>
                        <thead>
                        <tr>
                            <th data-sort-key="chunkId">Chunk ID</th>
                            <th>문서 / Section Path</th>
                            <th data-sort-key="tokenLen">길이</th>
                            <th>Badge</th>
                            <th>액션</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="chunk : ${chunks}">
                            <td><a class="mono-truncate" th:href="@{/admin/chunks/{id}(id=${chunk.chunkId()})}" th:text="${chunk.chunkId()}">chunk</a></td>
                            <td>
                                <div class="mono-truncate" th:text="${chunk.documentId()}">doc</div>
                                <div class="summary-card__meta line-clamp-2" th:text="${chunk.sectionPathText()}">section</div>
                            </td>
                            <td>
                                <div th:text="|tokens ${chunk.tokenLen()}|">tokens</div>
                                <div class="summary-card__meta" th:text="|chars ${chunk.charLen()}|">chars</div>
                            </td>
                            <td>
                                <div class="badge-row">
                                    <span class="plain-badge plain-badge--code" th:if="${chunk.codePresence()}">code</span>
                                    <span class="plain-badge plain-badge--table" th:if="${chunk.tablePresence()}">table</span>
                                    <span class="plain-badge plain-badge--list" th:if="${chunk.listPresence()}">list</span>
                                </div>
                            </td>
                            <td><a class="button" th:href="@{/admin/chunks/{id}(id=${chunk.chunkId()})}">Boundary 확인</a></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" th:if="${chunks.isEmpty()}">
                    조건에 맞는 chunk가 없습니다.
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
