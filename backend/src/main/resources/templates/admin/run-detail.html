<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실행 상세</title>
    <link rel="stylesheet" th:href="@{/admin/admin.css}">
    <script defer th:src="@{/admin/admin.js}"></script>
</head>
<body>
<div class="admin-shell">
    <aside th:replace="~{admin/fragments/chrome :: sidebar(${navKey})}"></aside>
    <div class="admin-main">
        <header th:replace="~{admin/fragments/chrome :: topbar(${pageTitle}, ${pageSubtitle})}"></header>
        <main class="admin-content">
            <div th:replace="~{admin/fragments/chrome :: pageHeader(${pageTitle}, ${pageSubtitle})}"></div>

            <section class="detail-card">
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="detail-item__label">실행 ID</div>
                        <div class="detail-item__value mono" th:text="${runDetail.run().runId()}">run</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">실행 유형</div>
                        <div class="detail-item__value" th:text="${runDetail.run().runType()}">full_ingest</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">상태</div>
                        <div class="detail-item__value">
                            <span class="status-badge" th:attr="data-status=${runDetail.run().runStatus()}" th:text="${runDetail.run().runStatus()}">running</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-item__label">대상 범위</div>
                        <div class="detail-item__value mono line-clamp-2" th:text="${runDetail.run().sourceScope()}">scope</div>
                    </div>
                </div>
                <div class="summary-card__meta" style="margin-top:10px;">
                    문서 분류 기준: <code>source / version / document</code>
                </div>
                <div class="toolbar" style="margin-top:16px;">
                    <form data-api-form data-method="POST" data-redirect="/admin/runs/{runId}" data-success-message="실행을 다시 시작했습니다."
                          th:action="@{/api/admin/pipeline/runs/{id}/retry(id=${runDetail.run().runId()})}">
                        <button class="button" type="submit">다시 실행</button>
                    </form>
                    <form data-api-form data-method="POST" data-reload="true" data-success-message="취소 요청을 보냈습니다."
                          data-confirm="이 실행을 취소할까요?" th:action="@{/api/admin/pipeline/runs/{id}/cancel(id=${runDetail.run().runId()})}">
                        <button class="button button--danger" type="submit">취소 요청</button>
                    </form>
                    <button class="button button--ghost" type="button" data-refresh-page>로그 새로고침</button>
                </div>
            </section>

            <div class="split-layout" style="margin-top:20px;">
                <section class="table-shell">
                    <div class="table-header">
                        <div class="table-title">단계별 진행 상태</div>
                    </div>
                    <div class="table-wrap">
                        <table class="data-table">
                            <thead>
                            <tr>
                                <th>순서</th>
                                <th>단계</th>
                                <th>상태</th>
                                <th>문서 진행</th>
                                <th>실행 명령</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="step : ${runDetail.steps()}">
                                <td th:text="${step.stepOrder()}">1</td>
                                <td>
                                    <div th:text="${step.stepName()}">collect</div>
                                    <div class="summary-card__meta" th:if="${step.errorMessage() != null}" th:text="${step.errorMessage()}">error</div>
                                </td>
                                <td>
                                    <span class="status-badge" th:attr="data-status=${step.stepStatus()}" th:text="${step.stepStatus()}">success</span>
                                </td>
                                <td>
                                    <div th:text="|발견 ${step.metricsJson().path('documents_discovered').asInt(0)} / 저장 ${step.metricsJson().path('documents_persisted').asInt(0)}|">발견 0 / 저장 0</div>
                                    <div class="summary-card__meta line-clamp-2 mono" th:text="${step.metricsJson().path('document_ids')}">[]</div>
                                </td>
                                <td>
                                    <div class="mono-truncate" th:text="${step.commandLine()}">command</div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="panel">
                    <div class="table-title">실행 설정</div>
                    <div class="text-surface mono" style="margin-top:12px;" th:text="${runDetail.run().configSnapshot()}">config</div>
                    <div class="table-title" style="margin-top:18px;">실행 요약</div>
                    <div class="text-surface mono" style="margin-top:12px;" th:text="${runDetail.run().summaryJson()}">summary</div>
                </section>
            </div>

            <section class="card-grid" style="margin-top:20px;">
                <article class="snippet-card" th:each="log : ${runLogs.steps()}">
                    <div class="table-title" th:text="|${log.stepName()} 로그|">collect 로그</div>
                    <div class="summary-card__meta mono-truncate" th:text="${log.stdoutLogPath()}">path</div>
                    <div class="log-viewer" style="margin-top:12px;" th:text="${log.stdout()}">stdout</div>
                    <div class="summary-card__meta" style="margin-top:10px;">오류 로그</div>
                    <div class="log-viewer" style="margin-top:8px;" th:text="${log.stderr()}">stderr</div>
                </article>
            </section>
        </main>
    </div>
</div>
</body>
</html>
