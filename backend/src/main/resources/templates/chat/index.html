<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Query Forge Chat</title>
    <link rel="stylesheet" th:href="@{/chat/chat.css}">
    <script defer th:src="@{/chat/chat.js}"></script>
</head>
<body>
<div class="chat-shell">
    <header class="hero">
        <div class="hero__title">Query Forge Chat</div>
        <div class="hero__subtitle">Spring 문서 기반 질의응답 + selective rewrite trace</div>
        <a class="hero__link" href="/admin/experiments">관리자 실험 모니터링</a>
    </header>

    <section class="chat-controls">
        <label>Mode
            <select id="mode">
                <option value="selective_rewrite">selective rewrite</option>
                <option value="raw_only">raw retrieval only</option>
                <option value="memory_only_gated">memory retrieval only (gated)</option>
                <option value="memory_only_ungated">memory retrieval only (ungated)</option>
                <option value="rewrite_always">rewrite always</option>
                <option value="selective_rewrite_with_session">selective rewrite + session context</option>
            </select>
        </label>
        <label>Gating Preset
            <select id="gatingPreset">
                <option value="full_gating">full_gating</option>
                <option value="rule_plus_llm">rule_plus_llm</option>
                <option value="rule_only">rule_only</option>
                <option value="ungated">ungated</option>
            </select>
        </label>
        <label>Threshold
            <input id="threshold" type="number" value="0.05" step="0.01" min="0" max="1">
        </label>
        <button id="reindexBtn" type="button">임베딩 재색인</button>
    </section>

    <section class="chat-panel">
        <textarea id="queryInput" placeholder="질문을 입력하세요. 예) Spring Security에서 인증 필터 체인 설정 순서가 뭐야?"></textarea>
        <button id="askBtn" type="button">질문하기</button>
    </section>

    <section id="result" class="result"></section>
</div>
</body>
</html>
