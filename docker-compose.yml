services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: query-forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-query_forge}
      POSTGRES_USER: ${POSTGRES_USER:-query_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-query_forge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-query_forge} -d ${POSTGRES_DB:-query_forge}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: query-forge-backend
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_ADDITIONAL_LOCATION: optional:file:/app/configs/app/
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-query_forge}
      POSTGRES_USER: ${POSTGRES_USER:-query_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-query_forge}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      PROMPT_ROOT: /app/configs/prompts
      EXPERIMENT_ROOT: /app/configs/experiments
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data

volumes:
  postgres-data:

